  {question: "The <b>earth wires</b> Saftey feature.,", answer: "\u201cThe earth wire is connected to the metal casing of an appliance. If the live wire touches the case, the earth wire provides a low-resistance path to the ground. A large current flows, causing the fuse to blow or circuit breaker to trip, cutting off the current and preventing electric shock.\u201d"},
  {question: "Electric current is defined as", answer: "<b>The rate of flow of electric charge</b>"},

  {question: "The equeation for total resistance in Series", answer: "R<sub>T</sub>=R<span style=\"\"color: rgb(255, 255, 255);\"\"><sub>1</sub>+R<sub>2</sub></span>"},
  {question: "<ul><li><div>For components connected in&nbsp;<b>series</b>:<br></div><ul><li><div>the&nbsp;<b>current&nbsp;</b></div></li><li><div>the&nbsp;<b>voltage</b>&nbsp;</div></li><li><div>the&nbsp;<b>total resistance</b>&nbsp;</div></li></ul></li></ul>", answer: "<ul><li><div>For components connected in&nbsp;<b>series</b>:<br></div><ul><li><div>the&nbsp;<b>current&nbsp;</b>is the same at all points and in each component</div></li><li><div>the&nbsp;<b>voltage</b>&nbsp;of the power supply is shared between the components</div></li><li><div>the&nbsp;<b>total resistance</b>&nbsp;is the sum of the resistances of each component</div></li></ul></li></ul>"},
  {question: "<ul><li><div>For components connected in&nbsp;<b>parallel</b>:</div><ul><li><div>the&nbsp;<b>current&nbsp;</b></div></li><li><div>the&nbsp;<b>voltage&nbsp;</b></div></li><li><div>the&nbsp;<b>total resistance</b></div></li></ul></li></ul>", answer: "<ul><li><div>For components connected in&nbsp;<b>parallel</b>:</div><ul><li><div>the&nbsp;<b>current&nbsp;</b>from the supply splits in the branches</div></li><li><div>the&nbsp;<b>voltage&nbsp;</b>across each branch is the same</div></li><li><div>the&nbsp;<b>total resistance</b>&nbsp;is less than that of each component</div></li></ul></li></ul>"},

  {question: "&nbsp;explain why the mass (nucleon) number and the atomic (proton) number do not change when<br>a gamma ray is emitted from a nucleus:", answer: "Any two from:<br>\u2022 Gamma is not a particle; [1 mark]<br>\u2022 Gamma rays have no (rest) mass; [1 mark]<br>\u2022 Gamma rays do not have a proton number; [1 mark]<br>\u2022 Gamma rays do not contain any protons or neutrons; [1 mark]<br>\u2022 Gamma rays are electromagnetic radiation; [1 mark]<br>\u2022 No particles are lost (from the nucleus) when a gamma ray is emitted; [1 mark]<br>[Total: 2 marks]"},

  {question: "How does induction transfer heat to potato&nbsp;<img src=\"\"paste-8cc8fb5b5f81995ad675ae284bd7ce3402e3253a.jpg\"\">", answer: "\u2022 By electromagnetic induction; [1 mark]<br>\u2022 The (alternating) current flowing through the coil creates a magnetic field around it; [1 mark]<br>\u2022 The magnetic field cuts through the metal pan; [1 mark]<br>\u2022 The magnetic field alternates/changes; [1 mark]<br>\u2022 The (changing) magnetic field induces a voltage (across the pan); [1 mark]<br>\u2022 The voltage causes a current in the pan; [1 mark]<br>\u2022 The current causes the pan to heat up/get hot; [1 mark]<br>\u2022 Heat energy is transferred from the pan to the water by conduction; [1 mark]<br>\u2022 Heat energy is transferred through the water by convection; [1 mark]"},

  {question: "&nbsp;the only way to reduce the <b>force</b> on the passenger is to..................", answer: "the only way to reduce the <b>force</b> on the passenger is to<b> increase the time it takes for that change to happen.</b>"},
  {question: "<table><tbody><tr><td><strong>Feature</strong></td><td><strong>How it increases time</strong></td><td><strong>Impact on Force</strong></td></tr><tr><td><b>Crumple Zones</b></td><td>Parts of the car body (front/back) are designed to \"\"scrunch up\"\" or deform during a hit.</td><td><br></td></tr><tr><td><b>Seat Belts</b></td><td>Made of slightly stretchy material.<br></td><td><br></td></tr><tr><td><b>Airbags</b></td><td>Soft, air-filled cushions that compress as you hit them.<br></td><td></td></tr></tbody></table>", answer: "<table><tbody><tr><td><strong>Feature</strong></td><td><strong>How it increases time</strong></td><td><strong>Impact on Force</strong></td></tr><tr><td><b>Crumple Zones</b></td><td>Parts of the car body (front/back) are designed to \"\"scrunch up\"\" or deform during a hit.</td><td>This increases the time it takes for the car (and its passengers) to come to a stop.</td></tr><tr><td><b>Seat Belts</b></td><td>Made of slightly stretchy material.</td><td>Instead of stopping you instantly, they stretch, allowing you to slow down over a longer time.</td></tr><tr><td><b>Airbags</b></td><td>Soft, air-filled cushions that compress as you hit them.</td><td>They increase the contact time of your head/chest compared to hitting a hard dashboard.</td></tr></tbody></table>"},
  {question: "Explain how safety features (like airbags or crumple zones) reduce the risk of injury during a collision in terms of momentum. (4 marks)", answer: "<ul><li><div>During a collision, there is a <b>fixed change in momentum</b> ($\\Delta p$).</div></li><li><div>Safety features <b>increase the time taken</b> ($t$) for this change to occur.</div></li><li><div>Since $F = \\frac{mv - mu}{t}$, increasing the time <b>decreases the average force</b> ($F$) acting on the passenger.</div></li><li><div>A smaller force results in a <b>reduced risk of injury</b>.</div></li></ul>"},
  {question: "Explain why the total current entering a junction must equal the total current leaving a junction.(3 mark)", answer: "<div><b></b></div><ul><li><div>Current is the <b>rate of flow of charge</b>.</div></li><li><div><b>Charge is conserved</b> (it cannot be created or destroyed).</div></li><li><div>Therefore, all charge that flows into a junction must flow out of it; it cannot be \"\"lost\"\" at the junction.</div></li></ul>"},
  {question: "Explain, in terms of electrons, why an insulator becomes positively charged when rubbed with a cloth.", answer: "<ul><li><div>Friction between the cloth and the insulator causes <b>electrons to be transferred</b>.</div></li></ul><ul><li><div>Electrons move <b>from the insulator to the cloth</b>.</div></li></ul><ul><li><div>The insulator now has <b>fewer electrons than protons</b>, resulting in a net <b>positive charge</b>.</div></li></ul>(Note: Protons do not move as they are fixed in the nucleus).<br>"},
  {question: "why a charged balloon sticks to a neutral wall", answer: "<ul><li><div>A negatively charged balloon is brought near the wall.</div></li><li><div>The electrons in the wall's surface are <b>repelled</b> by the balloon\u2019s negative charge and move further into the wall.</div></li><li><div>This leaves the surface of the wall with a <b>net positive charge</b> (a \"\"deficiency\"\" of electrons).</div></li><li><div>The balloon and the wall now have opposite charges and <b>attract</b> each other.</div></li></ul>"},

  {question: "Simile:&nbsp;", answer: "&nbsp;A comparison like using 'like' or 'as'<br>Example: The wind screamed like a wild animal.<br>Effect: Makes descriptions vivid and relatable"},

  {question: "Short Sentence:&nbsp;", answer: "Brief sentence for impact<br>Example: Gone.<br>Effect: Builds tension or emphasises a point"},

  {question: "", answer: "<div><ol><li><strong>D \u2013 Direct Address</strong> (using <em>\u201cyou\u201d</em> to involve the reader)</li><li><div><strong>A \u2013 Alliteration</strong> (repetition of the same sound, e.g., <em>\u201cfierce and frightening\u201d</em>)</div></li><li><div><strong>F \u2013 Facts</strong> (objective information, statistics, proven truth)</div></li><li><div><strong>O \u2013 Opinions</strong> (personal or expert viewpoints)</div></li><li><div><strong>R \u2013 Rhetorical Questions</strong> (questions asked for effect, not an answer)</div></li><li><div><strong>E \u2013 Emotive Language</strong> (words that stir emotions, e.g., <em>\u201cdevastating, heartbreaking\u201d</em>)</div></li><li><div><strong>S \u2013 Statistics</strong> (numbers, percentages, data for authority)</div></li><li><div><strong>T \u2013 Triplets / Rule of Three</strong> (three ideas in a row, e.g., <em>\u201clife, liberty, and happiness\u201d</em>)</div></li></ol>"},
  {question: "<strong>Parallelism</strong> \u2192", answer: "<strong>Parallelism</strong> \u2192 same sentence structure repeated (<em>\u201cShe came, she saw, she conquered\u201d</em>)"},
  {question: "<strong>Allusion</strong> \u2192", answer: "<strong>Allusion</strong> \u2192 indirect reference to history, myth, literature (<em>\u201copening Pandora\u2019s box\u201d</em>)"},
  {question: "<strong>Foreshadowing</strong> \u2192", answer: "<strong>Foreshadowing</strong> \u2192 hints at future events"},
  {question: "<strong>Anaphora</strong> \u2192", answer: "<strong>Anaphora</strong> \u2192 repetition at the start of sentences (<em>\u201cWe will fight\u2026 We will rise\u2026 We will win\u201d</em>)"},
  {question: "<strong>Epistrophe</strong> \u2192&nbsp;", answer: "<strong>Epistrophe</strong> \u2192 repetition at the end (<em>\u201c\u2026of the people, by the people, for the people\u201d</em>)"},

  {question: "Bioaccumulation", answer: "The gradual build-up of toxic substances (e.g. pesticides, heavy metals) in the tissues of an organism over time because they are not broken down or excreted. Throught is life span . This is only for one organism"},
  {question: "Biomagnification", answer: "The increase in concentration of toxic substances at each trophic level of a food chain, as predators eat many contaminated prey."},
  {question: "Eutrophication", answer: "The process where fertilisers or sewage run into water, causing rapid growth of algae (algal bloom). This blocks sunlight, killing plants; bacteria decompose them, using up oxygen, leading to death of aquatic animals."},
  {question: "Nutrition", answer: "The process by which organisms obtain <strong>energy and nutrients</strong> from their environment"},
  {question: "Respiration", answer: "The process of <strong>releasing energy</strong> from food (usually glucose)."},
  {question: "Movement", answer: "<p style=\"\"direction: ltr; margin-right: 0px; margin-bottom: 0px; margin-left: 15px; text-indent: -15px; font-style: normal; font-variant-caps: normal; font-width: normal; font-size: 23px; line-height: normal; font-family: &quot;Times New Roman&quot;; font-size-adjust: none; font-kerning: auto; font-variant-alternates: normal; font-variant-ligatures: normal; font-variant-numeric: normal; font-variant-east-asian: normal; font-variant-position: normal; font-feature-settings: normal; font-optical-sizing: auto; font-variation-settings: normal; color: rgb(255, 255, 255); -webkit-text-stroke-width: 0px; -webkit-text-stroke-color: rgb(255, 255, 255);\"\"><span style=\"\"font-kerning: none;\"\"><b>Movement is the change in position or place of an organism or part of an organism.</b></span></p><div><span style=\"\"font-kerning: none;\"\"><br></span></div>"},
  {question: "Sensitivity", answer: "The ability to <strong>detect and respond to stimuli</strong> in the environment."},
  {question: "Growth", answer: "An <strong>increase in size and mass</strong> of an organism."},
  {question: "Reproduction", answer: "The process by which organisms <strong>produce offspring</strong> to ensure the survival of their species."},
  {question: "Homeostasis", answer: "Maintaining a <strong>stable internal environment</strong> despite external changes."},
  {question: "What does carbon dioxide and methane have on the atmoosphere", answer: "they act as insulator<br>trapping sun's IR radiaton"},
  {question: "Example of Green houses gases are", answer: "Carbon diox<i>ide</i><br>Nitrous oxide<br>Water vapour<br>Methane<br>CFCs"},
  {question: "Explain one other potential consequence of the release of raw sewage into a water system.", answer: "Another consequence of sewage in the water is...<br>Sewage contains pathogens/pathogenic bacteria; [1 mark]<br>Which can cause disease; [1 mark]"},
  {question: "(ii) Respiration provides energy for the cell processes carried out by these decomposers.<br>Name one of these processes that is directly linked to how the decomposers get their<br>nutrition.", answer: "Any one of the following:<br>\u2022 Active transport (transports digested nutrients into the cells); [1 mark]<br>\u2022 Protein synthesis (creates digestive enzymes to be secreted); [1 mark]"},
  {question: "The air around us can contain a lot of chemicals that can be harmful to human health. Explain the biological consequences of air pollution by sulfur dioxide.", answer: "The biological consequences of air pollution by sulfur dioxide is... <br>Any three of the following: <br>\u2022 Sulfur dioxide released dissolves in water; [1 mark]<br>&nbsp;\u2022 And forms sulfuric acid; [1 mark] \u2022 Acid rain occurs; [1 mark] <br>\u2022 Which causes damage to plants/deforestation; [1 mark] <br>\u2022 Breathing problems for humans / animals; [1 mark] <br>\u2022 Death of fish/aquatic organisms; [1 mark]&nbsp;"},
  {question: "Another chemical that contributes to air pollution is carbon monoxide.<br>(i) State whether carbon monoxide is a greenhouse gas. Explain your answer.", answer: "\u2022 Not a greenhouse gas; [1 mark]<br>\u2022 It does not contribute to / cause global warming/warming of the atmosphere/(enhanced)<br>greenhouse effect; [1 mark]"},
  {question: "The functions of the atria include...", answer: "<ul><li><div>To pump/push/move blood into ventricles (from the atria);&nbsp;[1 mark]</div></li><li><div>To receive deoxygenated blood / blood from body / blood from vena cava;&nbsp;[1 mark]</div></li><li><div>To receive oxygenated blood / blood from lungs / blood from pulmonary vein;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Describe how the blood in the pulmonary artery differs from the blood in the aorta.", answer: "<p style=\"\"box-sizing: border-box; background-color: rgb(18, 18, 18);\"\">Blood in the pulmonary artery...</p><p style=\"\"box-sizing: border-box; background-color: rgb(18, 18, 18);\"\">Any&nbsp;<span style=\"\"box-sizing: border-box; font-weight: bolder;\"\">two</span>&nbsp;from the following:</p><ul style=\"\"box-sizing: border-box; padding-left: 2rem; margin-top: 0px; margin-bottom: 1rem; margin-block-end: 1rem; background-color: rgb(18, 18, 18);\"\"><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">Is at a low(er) pressure;&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">Contains a low(er) oxygen (concentration) / less oxygenated blood / more deoxygenated blood;&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">Contains a high(er) carbon dioxide (concentration);&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li></ul>"},
  {question: "The function of the heart-lung bypass machine is...", answer: "<div>The machine mimics lung function because...</div><ul><li><div>It oxygenates blood / adds oxygen to the blood;&nbsp;[1 mark]</div></li><li><div>It removes carbon dioxide (from the blood);&nbsp;[1 mark]</div></li></ul><div>The machine mimics heart function because...</div><ul><li><div>It transports/pumps blood around body;&nbsp;[1 mark]</div></li><li><div>(This therefore enables tissues/cells to) respire;&nbsp;[1 mark]</div></li><li><div>This then allows surgeon to operate on heart / connect new heart (without tissues dying);&nbsp;[1 mark]</div></li></ul>"},
  {question: "Explain why the heart transplant patient needs to be given immunosuppressants (lines 19 to 20).&nbsp;", answer: "<div>Any&nbsp;<b>two</b>&nbsp;from the following:</div><ul><li><div>It prevents rejection (of the transplanted heart);&nbsp;[1 mark]</div></li><li><div>(Rejection happens) because antigens (on the cells) are recognised / are different (to the patients cells);&nbsp;[1 mark]</div></li><li><div>(Immunosuppressants) stop the action of the immune system / reduces immune response / reduces lymphocyte action / stops antibody production / prevents white blood cells activity</div></li></ul>"},
  {question: "The patient should not smoke because", answer: "<div>Any&nbsp;<b>two</b>&nbsp;from the following:</div><ul><li><div>(Smoking leads to) less oxygen in blood / less efficient gas exchange;&nbsp;[1 mark]</div></li><li><div>(Smoking also) narrows arteries / damages artery walls / increased risk of fat in artery walls / atheroma / increased risk of heart disease;&nbsp;[1 mark]</div></li><li><div>Carbon monoxide (from the smoke) binds with haemoglobin / red blood cells;&nbsp;[1 mark]</div></li><li><div>(Smoking leads to increased risk of) blood clotting / strokes;&nbsp;[1 mark]</div></li><li><div>(Smoking increases the risk of) higher blood pressure;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Patients are advised to avoid strenuous exercise after heart transplant because", answer: "<ul><li><div>(Exercise) puts more pressure on heart / (increased risk of) heart attack / causes heart rate to increase / makes heart beat harder / increases blood pressure;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Protein enzyme will be made in ?", answer: "Ribosomes"},
  {question: "Rubisco has a unique 3D shape that enables it to carry out its roles in living organisms.<br>Describe how the 3D shape of rubisco is determined.", answer: "<div>The 3D shape of rubisco is determined as follows...</div><ul><li><div>The order of amino acids / amino acid sequence...;&nbsp;[1 mark]</div></li><li><div>...determines the position/type of bonds that form within the protein&nbsp;<b>OR&nbsp;</b>determine how the protein folds;&nbsp;[1 mark]&nbsp;</div></li></ul>"},
  {question: "Use your knowledge of proteins to suggest why body temperatures above 40 \u00b0C can be life<br>threatening.", answer: "<div>Any&nbsp;<b>four&nbsp;</b>of&nbsp;the following:</div><ul><li><div>High temperature leads to the breaking of bonds (that hold the protein/enzyme structure together);&nbsp;[1 mark]</div></li><li><div>Enzymes/proteins become denatured /&nbsp;denaturation occurs (at high temperatures);&nbsp;[1 mark]</div></li><li><div>Active sites become deformed / no longer compliment the substrate&nbsp;<b>OR</b>&nbsp;the shape/structure of proteins is lost;&nbsp;[1 mark]</div></li><li><div>Enzymes substrate complexes can no longer be formed&nbsp;<b>OR</b>&nbsp;proteins can no longer carry out their specific function;&nbsp;[1 mark]</div></li><li><div>Important chemical reactions/life processes can no longer take place / named example of a process that stops, e.g. respiration / digestion / transport across cell membranes;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Age may affect the likelihood of dying from lung cancer because.", answer: "<div>Any&nbsp;<b>two</b>&nbsp;of the following:</div><ul><li><div>As age increases the incidence of cancers also increases / cancer incidence increases with age / older people are more likely to develop cancer;&nbsp;[1 mark]</div></li><li><div>(This is because) DNA (inside cells) is more likely to mutate;&nbsp;[1 mark]</div></li><li><div>(Older people may have) smoked for a longer period;&nbsp;[1 mark]</div></li><li><div>(Older people may have a) weak immune system;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Smoking has the following effects on health", answer: "<div>Any&nbsp;<b>pair of points</b>&nbsp;from the following:</div><ul><li><div>(Smoking may) cause CHD / (coronary) heart disease / heart attack / blood clots;&nbsp;[1 mark]</div></li><li><div>Due to narrowing/blocking of arteries/blood vessels&nbsp;<b>OR</b>&nbsp;due to&nbsp;damage to artery/blood vessel lining;&nbsp;[1 mark]</div></li></ul><div><b>OR</b></div><ul><li><div>(Smoking may lead to) bronchitis / pneumonia / emphysema / lung infection / shortness of breath;&nbsp;[1 mark]</div></li><li><div>Due to damage to alveoli (which) reduces the surface area/SA (for gas exchange)&nbsp;<b>OR</b>&nbsp;(smoking) damages cilia (which leads to a) build-up of mucus / prevents removal of mucus;&nbsp;[1 mark]</div></li></ul><div><b>OR</b></div><ul><li><div>(Smoking) affects oxygen transport / causes shortness of breath;&nbsp;[1 mark]</div></li><li><div>Due to carbon monoxide binding to haemoglobin/Hb;&nbsp;[1 mark]</div></li></ul>"},
  {question: "A group of organisms responsible for decomposition are.", answer: "Bacteria / fungi"},
  {question: "An investigation to find out if changing the pH of organic material affects the rate of decomposition would be...", answer: "<div>Any&nbsp;<b>six&nbsp;</b>of the following:</div><ul><li><div>C = different pH of organic material / add acid / alkali / add buffers;&nbsp;[1 mark]</div></li><li><div>O =&nbsp;<u>same</u>&nbsp;organic material / plant / age / species / type / mass / volume / state of decay of organic material;&nbsp;[1 mark]</div></li><li><div>R = repeat (at each different pH);&nbsp;[1 mark]</div></li><li><div>M1 = measure&nbsp;<u>change</u>&nbsp;/&nbsp;<u>loss</u>&nbsp;in mass of organic material / initial mass \u2013 final mass / volume of carbon dioxide released / change in hydrogen-carbonate indicator / change in limewater;&nbsp;[1 mark]</div></li><li><div>M2 = after stated time period / 1 hour +;&nbsp;[1 mark]</div></li><li><div>S1 = same temperature / oxygen;&nbsp;[1 mark]</div></li><li><div>S2 = same water / same mineral ions / same humidity / same volume of each acid /alkali/ buffer / same (number of) bacteria / fungi / decomposer added;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The result of Benedict\u2019s test if the amylase digests the starch is that...", answer: "<ul><li><div>(Amylase) produces maltose / glucose (as it digests the starch)...;&nbsp;[1 mark]</div></li><li><div>... so (a positive result) turns red/green/yellow/orange (precipitate);&nbsp;[1 mark]</div></li></ul>"},
  {question: "The student predicted that the rate of digestion of starch would keep increasing as temperature<br>increased.<br>Comment on this prediction.", answer: "<div><i>The student is correct&nbsp;</i></div><ul><li><div>(Rate will increase as temperature increases) due to increased kinetic energy;&nbsp;[1 mark]</div></li><li><div>(Rate will increase as temperature increases) as there is (more) movement of molecules / are more collisions;&nbsp;[1 mark]</div></li></ul><div><i>The student's prediction is not complete / not entirely correct</i></div><div>A maximum of&nbsp;<b>two</b>&nbsp;of the following:</div><ul><li><div>(Rate will increase as temperature increases only) until the optimum temperature is reached;&nbsp;[1 mark]</div></li><li><div>The rate decreases / digestion stops at high temperatures;&nbsp;[1 mark]</div></li><li><div>Because the enzyme denatures / there is a change to the active site / the enzyme no longer binds to the substrate;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The conclusion that stem cell therapy is an effective treatment for muscular dystrophy can be evaluated as follow", answer: "<div><i>In support of the conclusion</i></div><ul><li><div>Most patients / all patients except 1 showed improvement in muscle mass after treatment;&nbsp;[1 mark]</div></li><li><div>The trial was a clinical trial / involved human patients;&nbsp;[1 mark]</div></li></ul><div><i>Against the conclusion</i></div><div>A&nbsp;<b>maximum of two&nbsp;</b>of the following:</div><ul><li><div>Most patients only showed a small improvement in muscle mass;&nbsp;[1 mark]</div></li><li><div>Muscle mass improvement may not lead to an improvement in symptoms;&nbsp;[1 mark]</div></li><li><div>The sample size/number of patients in the study is small / the study only included 38 patients;&nbsp;[1 mark]</div></li><li><div>1 patient showed no improvement in muscle mass;&nbsp;[1 mark]</div></li><li><div>The study does not consider safety/side effects of the treatment;&nbsp;[1 mark]</div></li><li><div>The study does not include a control group / a group of individuals not receiving stem cell treatment;&nbsp;[1 mark]</div></li><li><div>More evidence is / other studies are needed;&nbsp;[1 mark]</div></li></ul>"},
  {question: "A safe method to test for starch in a leaf would be as follows", answer: "<ul><li><div>Place leaf in boiling water;&nbsp;[1 mark]</div></li><li><div>Boil / heat (the leaf) in ethanol;&nbsp;[1 mark]</div></li><li><div>(For safety) use a water bath / switch off Bunsen / keep away from Bunsen;&nbsp;[1 mark]</div></li><li><div>Wear safety glasses / use tongs / forceps;&nbsp;[1 mark]</div></li><li><div>Add iodine solution (to the leaf);&nbsp;[1 mark]</div></li><li><div>If starch is present, (the leaf) goes blue/black / see if the leaf goes blue / black;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The plant pot is placed in the dark for 24 hours because", answer: "<ul><li><div>No photosynthesis (will occur in the dark);&nbsp;[1 mark]</div></li><li><div>Therefore it destarches (the plant) / removes all starch;&nbsp;[1 mark]</div></li><li><div>(This is because starch is all used up) by respiration;&nbsp;[1 mark]</div></li><li><div>So any starch present (as shown in the starch test) is due to photosynthesis (in the experiment);&nbsp;[1 mark]</div></li></ul>"},
  {question: "The results show that light is required for photosynthesis because...", answer: "<ul><li><div>(With reference to) leaf Y;&nbsp;[1 mark]</div></li><li><div>There will be no starch present under black paper strip;&nbsp;[1 mark]</div></li><li><div>Therefore this part (under the black paper strip) will be yellow/ orange / not blue black;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Plant store starch because", answer: "<ul><li><div>Starch is insoluble / doesn't dissolve (in water);&nbsp;[1 mark]</div></li><li><div>Therefore it does not have osmotic effect on plant cell / does not diffuse / pass out of cells;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The mouse uses more oxygen per gram than a human because.", answer: "<div>Any&nbsp;<b>three</b>&nbsp;of the following:</div><ul><li><div>The mouse is smaller / less body mass;&nbsp;[1 mark]</div></li><li><div>It has a larger surface area to volume ratio;&nbsp;[1 mark]</div></li><li><div>(Therefore there will be more) heat loss / mice lose heat faster;&nbsp;[1 mark]</div></li><li><div>(Mice need to) maintain body temperature;&nbsp;[1 mark]</div></li><li><div>(Therefore more) respiration / higher metabolic rate;&nbsp;[1 mark]</div></li></ul>"},
  {question: "(iii) Humans can run for long periods of time. Frogs can only move for short periods of time.<br>Explain how the structure of the heart of a frog means that it is unable to move for long periods of<br>time.", answer: "<div>(iii) The frog would be unable to move for long periods of time because...</div><div>Any&nbsp;<b>five</b>&nbsp;of the following:</div><ul><li><div>(It has only) one ventricle;&nbsp;[1 mark]</div></li><li><div>This means that oxygenated and deoxygenated blood mixes / blood from body mixes with blood from lung;&nbsp;[1 mark]</div></li><li><div>So less deoxygenated blood goes to lungs / some oxygenated blood to lungs;&nbsp;[1 mark]</div></li><li><div>This results in less efficient gas exchange in lungs;&nbsp;[1 mark]</div></li><li><div>(The frog heart has) no semi-lunar valves;&nbsp;[1 mark]</div></li><li><div>So there will be backflow of blood into ventricle;&nbsp;[1 mark]</div></li><li><div>This means less oxygenated blood to body / some deoxygenated blood to body / less oxygen (to body);&nbsp;[1 mark]</div></li><li><div>Therefore less respiration / more anaerobic respiration;&nbsp;[1 mark]</div></li><li><div>Lactic acid accumulation / less ATP made / less energy released ;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The respirometers were placed in a water bath at 25\u00b0C for 30 minutes because", answer: "<ul><li><div>Same temperature / so temperature is a control variable;&nbsp;[1 mark]</div></li><li><div>(To provide) good/ideal/optimum temperature for enzyme action in the peas;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The student wanted to adjust this investigation to measure the heat given off by respiration in<br>germinating peas.<br>Design an investigation to find out if germinating peas release heat energy from respiration.<br>Your answer should include experimental details and be written in full sentences.", answer: "<div>The investigation would be as follows...</div><div>Any&nbsp;<b>six&nbsp;</b>of the following:</div><ul><li><div>C = change the types of seeds used e.g. germinating seeds, boiled seeds, glass beads;&nbsp;[1 mark]</div></li><li><div>O =&nbsp;<u>same</u>&nbsp;species of pea / number of peas;&nbsp;[1 mark]</div></li><li><div>R = repeat several times;&nbsp;[1 mark]</div></li><li><div>M = measure temperature change using a thermometer/temperature probe;&nbsp;[1 mark]</div></li><li><div>M = detail of the duration of experiment e.g. test (temperature) every hour for 5 hours;&nbsp;[1 mark]</div></li><li><div>S = same moisture/water (in cotton wool);&nbsp;[1 mark]</div></li><li><div>S = same oxygen availability;&nbsp;[1 mark]</div></li></ul>"},
  {question: "<i>Volvox</i>&nbsp;a multi made up of single celled org is not considered to have tissues or organs because..", answer: "<p style=\"\"box-sizing: border-box; background-color: rgb(18, 18, 18);\"\">Any&nbsp;<span style=\"\"box-sizing: border-box; font-weight: bolder;\"\">two</span>&nbsp;of the following:</p><ul style=\"\"box-sizing: border-box; padding-left: 2rem; margin-top: 0px; margin-bottom: 1rem; margin-block-end: 1rem; background-color: rgb(18, 18, 18);\"\"><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">The somatic cells form a hollow ball (so do not have the structure of a tissue);&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">The somatic cells are spaced out / connected to each other only by strands of cytoplasm (so do not have the structure of a tissue);&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">Gonidia cells are not found in groups (so they do not count as a tissue);&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">The two cell types do not work together to carry out a common function (so they do not form an organ);&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li><li style=\"\"box-sizing: border-box;\"\"><p style=\"\"box-sizing: border-box; margin-block-end: 0px;\"\">Two different cell types are not enough to form an organ;&nbsp;<span data-type=\"\"examMark\"\" style=\"\"box-sizing: border-box; --emphasis-color: #6130b0; --emphasis-color-dark: #d5cbff;\"\">[1 mark]</span></p></li></ul>"},
  {question: "The structural organisation of kelp can be contrasted with that of&nbsp;<i>Volvox</i>&nbsp;as follows.", answer: "<ul><li><div>Kelp has organs (e.g. holdfast / stipe etc.)&nbsp;<b>WHILE</b>&nbsp;<i>Volvox</i>&nbsp;does not;&nbsp;[1 mark]</div></li><li><div>Kelp has several layers of cells&nbsp;<b>WHILE</b>&nbsp;<i>Volvox</i>&nbsp;is a hollow ball / has only one (outer) layer of cells;&nbsp;[1 mark]</div></li><li><div>Kelp has several tissue types (e.g. epidermis / medulla)&nbsp;<b>WHILE</b>&nbsp;<i>Volvox</i>&nbsp;does not have tissues;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The hyphae in the medulla are crucial to the growth of the kelp because", answer: "<div>ny&nbsp;<b>four</b>&nbsp;of the following:</div><ul><li><div>The frond/leaf is the only part of the kelp located near to the water's surface (due to flotation provided by the air bladder);&nbsp;[1 mark]</div></li><li><div>The leaf/frond absorbs light energy from the sun&nbsp;<b>SO</b>&nbsp;can carry out photosynthesis;&nbsp;[1 mark]</div></li><li><div>Photosynthesis produces glucose;&nbsp;[1 mark]</div></li><li><div>Glucose must be transported&nbsp;<b>SO</b>&nbsp;that the cells (in other parts of the kelp) can carry out respiration;&nbsp;[1 mark]</div></li><li><div>Respiration releases energy that allows the kelp to grow;&nbsp;[1 mark]</div></li></ul>"},

  {question: "What is <b>Menstrual Cycle&nbsp;</b>?", answer: "The <strong>menstrual cycle</strong> is the monthly sequence of changes in a woman\u2019s reproductive system that prepares the body for the possibility of pregnancy. It involves the <strong>thickening of the uterus lining</strong>, the <strong>release of an egg (ovulation)</strong>, and, if fertilisation does not occur, the <strong>shedding of the uterus lining as menstrual bleeding</strong>."},

  {question: "Explain lock and key theory in enzyme", answer: "<ul><li><div>The substrate and active site are&nbsp;<u>complementary</u>&nbsp;/ the active site is&nbsp;<u>specific</u>&nbsp;to one substrate;&nbsp;[1 mark]</div></li><li><div>An enzyme-substrate complex forms;&nbsp;[1 mark]</div></li><li><div>(The substrate is) converted/broken down into products;&nbsp;[1 mark]</div></li><li><div>The products are released from the active site;&nbsp;[1 mark]</div></li><li><div>The enzyme acts on more substrate molecules / is unchanged;&nbsp;[1 mark]</div></li></ul>"},
  {question: "<div>(ii) It is necessary for the three types of virus to have different structures because...</div>", answer: "<div>Any&nbsp;<b>three&nbsp;</b>of the following:</div><ul><li><div>They infect different types of cell/organism/species / different cells have different structures to invade;&nbsp;[1 mark]</div></li><li><div>Viruses have to have mechanisms to insert their genetic material/DNA/RNA into host cell / host cell will have different adaptations/barriers to prevent this;&nbsp;[1 mark]</div></li><li><div>E.g. TMV / bacteriophage have to get past cell walls, coronavirus does not;&nbsp;[1 mark]</div></li><li><div>Have different mechanisms for how they spread / transfer between hosts;&nbsp;[1 mark]</div></li><li><div>Adaptations to resist actions of host organism's immune system;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Viruses can spread by...", answer: "<ul><li><div>Insects / animals / bites / vectors;&nbsp;[1 mark]</div></li><li><div>Contaminated food;&nbsp;[1 mark]</div></li><li><div>Contaminated water;&nbsp;[1 mark]</div></li><li><div>Touch;&nbsp;[1 mark]</div></li><li><div>In the air / coughs/sneezes / droplets;&nbsp;[1 mark]</div></li></ul>"},
  {question: "<div>(ii) Taking medication to stop HIV from replicating can prevent AIDS by...</div>", answer: "<ul><li><div>Stops viruses increasing in number (in the body);&nbsp;[1 mark]</div></li><li><div>Stops HIV spreading to new white blood cells;&nbsp;[1 mark]</div></li><li><div>More white blood cells are able to help destroy pathogens / immune system remains strong;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Two reasons why the numbers of deaths of HIV might have declined in recent years is because...", answer: "<ul><li><div>Better understanding/education about how HIV spreads;&nbsp;[1 mark]</div></li><li><div>More availability of drugs to prevent HIV replicating;&nbsp;[1 mark]</div></li><li><div>More availability of mechanisms to prevent the spread of HIV (e.g. condoms);&nbsp;[1 mark]</div></li><li><div>Better treatments for AIDS-related illnesses / more medics/healthcare in less developed parts of the world where there is a lot of HIV;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Wh do fish die and algae is obsorved near a fertilizer factory", answer: "<ul><li><div>Nitrates leaked/leached into the river (between the two sites);&nbsp;[1 mark]</div></li><li><div>Causing eutrophication;&nbsp;[1 mark]</div></li><li><div>Algae block light to underwater plants / underwater plants cannot photosynthesise;&nbsp;[1 mark]</div></li><li><div>(Dead plants / algae) broken down by microorganisms;&nbsp;[1 mark]</div></li><li><div>Microorganisms respire;&nbsp;[1 mark]</div></li><li><div>Causing oxygen depletion / less oxygen available for the fish;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Some are concerned about the insertion of genes from other species, such as the gene for Bt toxin, into crop plants because...", answer: "<ul><li><div>The new genes might enter wild plant populations;&nbsp;[1 mark]</div></li><li><div>Insects other than the pest species might be killed;&nbsp;[1 mark]</div></li><li><div>There could be a loss of biodiversity / the animals that rely on insects for food will have less food to eat / food chains/webs will be disrupted;&nbsp;[1 mark]</div></li><li><div>There could be unknown (long-term) health effects on humans (who eat the crops);&nbsp;[1 mark]</div></li><li><div>Seeds of resistant varieties are more expensive / poorer farmers cannot afford the seeds of GM varieties;&nbsp;[1 mark]</div></li><li><div>Farmers might grow only this crop / a monoculture (of GM crop)&nbsp;<b>SO</b>&nbsp;leading to loss of other/rarer crop varieties;&nbsp;[1 mark]</div></li><li><div>Insects might develop resistance to the Bt toxin&nbsp;<b>SO</b>&nbsp;leading to increased pesticide use;&nbsp;[1 mark]</div></li></ul>"},

  {question: "A method that she could use to prepare a pure, dry sample of magnesium nitrate crystals from magnesium oxide is:", answer: "<div><b>Part 1</b>:<b>&nbsp;</b>making magnesium nitrate solution - a description linking any&nbsp;<b>three&nbsp;</b>of the following points</div><ul><li><div>Warm / heat the acid (in a beaker / flask);&nbsp;[1 mark]&nbsp;<i>Do not allow boil</i></div></li><li><div>Add magnesium oxide (to acid a little at a time) until in excess / no more dissolves;&nbsp;[1 mark]</div></li><li><div>Stir;&nbsp;[1 mark]&nbsp;<i>This mark is dependent on the use of acid and oxide</i></div></li><li><div>Filter to remove excess magnesium oxide / excess solid;&nbsp;[1 mark]</div></li></ul><div><b>Part 2</b>: using (magnesium nitrate) solution / filtrate - a description linking any&nbsp;<b>three&nbsp;</b>of the following points:</div><ul><li><div>Heat / boil (magnesium nitrate solution / filtrate);&nbsp;[1 mark]</div></li><li><div>Until crystals form in a cooled sample / on glass rod / to crystallisation point;&nbsp;[1 mark]</div></li><li><div>Leave the solution to cool / crystallise;&nbsp;[1 mark]</div></li><li><div>Filter /decant the solution (to remove crystals);&nbsp;[1 mark]</div></li><li><div>Suitable method to dry the crystals e.g. using filter paper / using paper towel / in warm oven / in a desiccator;&nbsp;[1 mark]&nbsp;<i>Do not allow hot oven or any method of direct heating e.g. Bunsen</i>&nbsp;<i>Allow leave to dry but not just dry the crystals</i></div></li></ul>"},

le=\"\"box-sizing: border-box;\"\">If any mention of intermolecular forces scores a maximum of 2 marks</i>&nbsp;<i style=\"\"box-sizing: border-box;\"\">If any mention of ions, only that final mark can be awarded</i></p></li></ul>"},
  {question: "Why is graphite suitable for pencil", answer: "<div>For graphite, any&nbsp;<b>three</b>&nbsp;from:</div><ul><li><div>Each (carbon) atom is (covalently) bonded to three other (carbon) atoms;&nbsp;[1 mark]</div></li><li><div>(The structure is) in layers / sheets;&nbsp;[1 mark]</div></li><li><div>With weak forces (between layers);&nbsp;[1 mark]</div></li><li><div>(The layers can) slide over each other / rub off;&nbsp;[1 mark]</div></li><li><div>This makes graphite soft / slippery;&nbsp;[1 mark]&nbsp;<i>If any mention of intermolecular forces scores a maximum of 2 marks</i>&nbsp;<i>If any mention of ions, only that final mark can be awarded</i></div></li></ul>"},
  {question: "Describe stucture and onding of sodium chloride", answer: "<div>The structure and bonding in sodium chloride is:</div><ul><li><div>(Sodium chloride has a) lattice / giant structure ;&nbsp;[1 mark]</div></li><li><div>It contains ions&nbsp;<b>OR</b>&nbsp;Ionic bonding;&nbsp;[1 mark]</div></li><li><div>Na<sup>+</sup>&nbsp;<b>AND&nbsp;</b>C<i>l</i><sup>-</sup>;&nbsp;[1 mark]</div></li><li><div>There is an electrostatic attraction (between the ions);&nbsp;[1 mark]</div></li></ul>"},
  {question: "<div>During the electrolysis of molten sodium chloride</div>", answer: "<ul><li><div>Sodium&nbsp;<u>ions</u>&nbsp;/ Na<sup>+</sup>&nbsp;are attracted to the cathode / negative electrode&nbsp;<b>AND&nbsp;</b>Chloride&nbsp;<u>ions</u>&nbsp;/ Cl<sup>\u2013</sup>&nbsp;are attracted to the anode / positive electrode;&nbsp;[1 mark]</div></li><li><div>Sodium ions / Na<sup>+</sup>&nbsp;loses one electron&nbsp;&nbsp;<b>AND&nbsp;</b>Sodium ions / Na<sup>+</sup>&nbsp;are reduced;&nbsp;[1 mark]</div></li><li><div>Chloride ions /&nbsp;Cl<sup>\u2013</sup>&nbsp;gains one electron&nbsp;&nbsp;<b>AND&nbsp;</b>Chloride ions / Cl<sup>\u2013</sup>&nbsp;are oxidised;&nbsp;[1 mark]</div></li><li><div>Na<sup>+</sup>&nbsp;\u2192 e<sup>\u2013</sup>&nbsp;+ Na&nbsp;<b>AND&nbsp;</b>2Cl+ 2e<sup>\u2013</sup>&nbsp;\u2192 Cl<sub>2</sub>\u2013;&nbsp;[1 mark]</div></li></ul>"},
  {question: "The different products from the electrolysis of aqueous sodium chloride are:", answer: "<ul><li><div>Hydrogen is produced instead of sodium&nbsp;<b>AND</b>&nbsp;(Because,) sodium is more reactive than hydrogen;&nbsp;[1 mark]</div></li><li><div>Sodium hydroxide is produced&nbsp;<b>AND&nbsp;</b>From the sodium ion / Na<sup>+</sup>&nbsp;and the hydroxide ion / OH<sup>\u2013</sup>;&nbsp;[1 mark]</div></li></ul>"},
  {question: "Oxygen can be produced by the electrolysis of seawater by", answer: "<ul><li><div>Removing the salt / purifying the seawater;&nbsp;[1 mark]</div></li><li><div>Electrolysis of pure water produces hydrogen and oxygen;&nbsp;[1 mark]</div></li></ul>"},

  {question: "Which catalyst is used in the Ostwald Process (to make nitric acid)?", answer: "Platinum or rhodium"},
  {question: "What are the conditions used in the Ostwald Process?", answer: "Platinum/rhodium catalyst, 900\u00b0C, 4 atm"},

  {question: "Which catalyst is used in hydrogenation of vegetable oils (making margarine)?", answer: "Nickel (Ni)"},
  {question: "What are the conditions for hydrogenation of oils?", answer: "About 150\u00b0C"},
  {question: "Which catalyst decomposes hydrogen peroxide (H\u2082O\u2082 \u2192 H\u2082O + O\u2082)?", answer: "Manganese(IV) oxide (MnO\u2082)"},
  {question: "What is the purpose of MnO\u2082 in hydrogen peroxide decomposition?", answer: "It speeds up the breakdown of hydrogen peroxide into water and oxygen"},

  {question: "What is the Haber Process used to make?", answer: "Ammonia (NH\u2083)"},
  {question: "What are the raw materials for the Haber Process?", answer: "Nitrogen (from air) and hydrogen (from natural gas)"},
  {question: "What is the equation for the Haber Process?", answer: "N\u2082 + 3H\u2082 \u21cc 2NH\u2083"},
  {question: "What is the catalyst used in the Haber Process?", answer: "Iron (Fe)"},
  {question: "What are the conditions for the Haber Process?", answer: "450\u00b0C, 200 atm"},
  {question: "Is the Haber Process reversible or irreversible?", answer: "Reversible"},
  {question: "How are unreacted gases separated in the Haber Process?", answer: "The mixture is cooled; ammonia liquefies and is removed; unreacted N\u2082 and H\u2082 are recycled."},
  {question: "What is ammonia used for?", answer: "Fertilisers such as ammonium nitrate and ammonium sulfate."},
  {question: "What is the Contact Process used to make?", answer: "Sulfuric acid (H\u2082SO\u2084)"},
  {question: "What is the catalyst used in the Contact Process?", answer: "Vanadium(V) oxide (V\u2082O\u2085)"},
  {question: "What are the main conditions for the Contact Process?", answer: "450\u00b0C, 2 atm"},
  {question: "Is the Contact Process reversible or irreversible?", answer: "Reversible"},
  {question: "What is the key reversible step in the Contact Process?", answer: "2SO\u2082 + O\u2082 \u21cc 2SO\u2083"},
  {question: "Why is the temperature in the Contact Process not too high?", answer: "Because high temperature decreases yield (forward reaction is exothermic)."},
  {question: "What is sulfuric acid used for?", answer: "Fertilisers, detergents, paints, explosives."},
  {question: "What is the Ostwald Process used to make?", answer: "Nitric acid (HNO\u2083)"},
  {question: "What is the catalyst used in the Ostwald Process?", answer: "Platinum or Rhodium"},
  {question: "What are the conditions for the Ostwald Process?", answer: "900\u00b0C, 4 atm"},
  {question: "What is the starting material in the Ostwald Process?", answer: "Ammonia (NH\u2083)"},
  {question: "What is nitric acid used for?", answer: "Fertilisers and explosives."},
  {question: "What is catalytic cracking used for?", answer: "Breaking long-chain hydrocarbons into shorter alkanes and alkenes."},
  {question: "What are the catalysts used in catalytic cracking?", answer: "Alumina (Al\u2082O\u2083) or Silica (SiO\u2082)"},
  {question: "What are the products of cracking?", answer: "Shorter alkanes and alkenes (used for fuels and polymers)."},
  {question: "What is hydrogenation of oils used for?", answer: "Converting unsaturated vegetable oils into margarine."},
  {question: "What is the catalyst used in hydrogenation?", answer: "Nickel (Ni)"},
  {question: "Why is hydrogenation done?", answer: "To make oils more solid and spreadable by saturating C=C bonds."},
  {question: "What reaction does manganese(IV) oxide catalyse?", answer: "Decomposition of hydrogen peroxide (2H\u2082O\u2082 \u2192 2H\u2082O + O\u2082)"},
  {question: "What is the catalyst for hydrogen peroxide decomposition?", answer: "Manganese(IV) oxide (MnO\u2082)"},
  {question: "What are the products of hydrogen peroxide decomposition?", answer: "Water and oxygen."},
  {question: "Why is MnO\u2082 used as a catalyst?", answer: "It speeds up the decomposition without being used up."},
  {question: "What is fermentation used for?", answer: "Producing ethanol (alcohol) from glucose."},
  {question: "What is the catalyst in fermentation?", answer: "Enzyme (zymase) from yeast."},
  {question: "What are the conditions for fermentation?", answer: "30\u201340\u00b0C, anaerobic conditions."},
  {question: "What is the equation for fermentation?", answer: "C\u2086H\u2081\u2082O\u2086 \u2192 2C\u2082H\u2085OH + 2CO\u2082"},
  {question: "Why must fermentation be anaerobic?", answer: "Because oxygen would oxidise ethanol to ethanoic acid."},
  {question: "What is a catalytic converter used for?", answer: "Reducing pollution in car exhaust gases."},
  {question: "What are the catalysts in a catalytic converter?", answer: "Platinum, Palladium, and Rhodium."},
  {question: "What do catalytic converters do to carbon monoxide?", answer: "Convert CO \u2192 CO\u2082"},
  {question: "What do catalytic converters do to nitrogen oxides (NO\u2093)?", answer: "Convert NO\u2093 \u2192 N\u2082"},
  {question: "At what temperature do catalytic converters operate?", answer: "Around 200\u2013600\u00b0C (hot exhaust gases)."},

    function loadCategory(name) {
        currentCards = categories[name].filter(function(card) {
            return card.question.trim() !=""

        })
        currentIndex = 0
        mistakes = 0
        card_counter = 0
        showCard(0)
    }
    let fill = document.querySelector(".progress_fill")
    
    function nextCard(knewIt) {
    if (!knewIt) mistakes++
    if (currentIndex < currentCards.length - 1) {
        currentIndex++
        card.classList.remove("flipped")
        setTimeout(function() {
            showCard(currentIndex)
            fill.style.width = (currentIndex / currentCards.length) * 100 + "%"
        }, 500)
    } else {
        let question = document.querySelector(".question")
        question.innerHTML = "Done! 🎉 Mistakes: " + mistakes
    }
}
    let card = document.querySelector(".inner_card")
     card.addEventListener("click", function() {
        card.classList.toggle("flipped") 
     })
    function showCard(index) {
        card.classList.remove("flipped")
        let question = document.querySelector(".question")
        let answer = document.querySelector(".answer")
        question.innerHTML = currentCards[index].question
        answer.innerHTML = currentCards[index].answer
            setTimeout(function() {
        MathJax.typesetPromise([question, answer])
    }, 100)
       document.querySelector("#cards_counter").innerHTML = (index + 1) + " / " + currentCards.length
}
